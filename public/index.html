<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система заказов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<button onclick="logout()">Выход</button>
<h1>ООО "СТИЛСОФТ"</h1>

<h2>Создание заказа</h2>

<input id="title" placeholder="Название">
<input id="description" placeholder="Описание">

<button onclick="createOrder()">
    Создать
</button>

<h2>Список заказов</h2>

<h2>📊 Панель управления</h2>

<div style="display:flex; gap:20px; margin-bottom:20px;">
    <div>📦 Всего: <span id="total"></span></div>
    <div>🆕 Новые: <span id="new"></span></div>
    <div>⚙️ В работе: <span id="progress"></span></div>
    <div>✅ Выполнено: <span id="done"></span></div>
</div>

<table border="1" width="100%" id="ordersTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Описание</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="app.js"></script>

</body>
</html>
