<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — СТИЛСОФТ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-box">
    <div class="login-logo">СТИЛ<span>СОФТ</span></div>
    <div class="login-subtitle">Система управления заказами</div>

    <div class="login-form">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="username" placeholder="Введите логин">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>
        <button class="btn btn-primary" onclick="login()">Войти</button>
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!data.token) {
        alert('Неверный логин или пароль');
        return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = '/';
}
</script>

</body>
</html>
