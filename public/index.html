<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система заказов — СТИЛСОФТ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-logo">СТИЛ<span>СОФТ</span> · Заказы</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="/clients.html" class="btn-logout">Клиенты</a>
        <a href="/users.html" class="btn-logout" id="usersLink" style="display:none;">Пользователи</a>
        <button class="btn-logout" onclick="logout()">Выход</button>
    </div>
</header>

<div class="container">

    <!-- Дашборд -->
    <div class="dashboard">
        <div class="stat-card total">
            <div class="stat-label">Всего заказов</div>
            <div class="stat-value" id="total">—</div>
        </div>
        <div class="stat-card new">
            <div class="stat-label">Новые</div>
            <div class="stat-value" id="new">—</div>
        </div>
        <div class="stat-card progress">
            <div class="stat-label">В работе</div>
            <div class="stat-value" id="progress">—</div>
        </div>
        <div class="stat-card done">
            <div class="stat-label">Выполнено</div>
            <div class="stat-value" id="done">—</div>
        </div>
    </div>

    <!-- Создание заказа (скрывается для analyst) -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Новый заказ</span>
        </div>
        <div class="section-body">
            <div class="order-form">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="title" placeholder="Введите название заказа">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <input type="text" id="description" placeholder="Краткое описание">
                </div>
                <div class="form-group">
                    <label>Клиент</label>
                    <select id="client_id">
                        <option value="">— Без клиента —</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="createOrder()">Создать</button>
            </div>
        </div>
    </div>

    <!-- Список заказов -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Список заказов</span>
        </div>
        <table class="orders-table" id="ordersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Описание</th>
                    <th>Клиент</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
